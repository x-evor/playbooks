---
- name: Reload caddy
  ansible.builtin.service:
    name: caddy
    state: reloaded

- name: Restart codex app server
  ansible.builtin.service:
    name: "{{ acp_codex_service_name }}"
    state: restarted

- name: Restart codex acp bridge
  ansible.builtin.service:
    name: "{{ acp_codex_bridge_service_name }}"
    state: restarted
