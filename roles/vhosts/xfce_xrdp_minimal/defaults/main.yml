---
xfce_user: ubuntu

xfce_packages:
  - xfce4-session
  - xfwm4
  - xfdesktop4
  - xfce4-panel
  - xfce4-terminal
  - dbus-x11
  - fonts-noto-cjk
  - xserver-xorg-core
  - xorgxrdp
  - xrdp

xfce_enable_ufw: true
xfce_rdp_port: 3389
xfce_disable_compositor: true
xfce_disable_animations: true
xfce_manage_user: false
xfce_user_groups: []
xfce_user_shell: /bin/bash
xfce_user_password_plaintext: ""
