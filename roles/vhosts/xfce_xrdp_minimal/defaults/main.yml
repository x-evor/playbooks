---
xfce_user: ubuntu

xfce_packages:
  - xfce4-session
  - xfce4-panel
  - xfce4-settings
  - xfce4-terminal
  - xfce4-power-manager
  - xfwm4
  - thunar
  - dbus-x11
  - x11-xserver-utils
  - xserver-xorg-core
  - xorgxrdp
  - chromium
  - fonts-noto-cjk
  - xrdp

xfce_enable_ufw: true
xfce_rdp_port: 3389

xfce_disable_compositor: true
xfce_disable_animations: true

xfce_manage_user: true
xfce_user_shell: /bin/bash
xfce_user_groups:
  - sudo
