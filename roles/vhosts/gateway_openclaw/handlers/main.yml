---
- name: Reload systemd
  ansible.builtin.systemd:
    daemon_reload: true
  when:
    - not ansible_check_mode

- name: Restart openclaw gateway
  ansible.builtin.systemd:
    name: "{{ gateway_openclaw_service_name }}"
    state: restarted
  when:
    - not ansible_check_mode

- name: Reload caddy
  ansible.builtin.systemd:
    name: caddy
    state: reloaded
  when:
    - not ansible_check_mode
