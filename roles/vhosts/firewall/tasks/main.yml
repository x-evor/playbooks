---
- name: Detect UFW binary
  ansible.builtin.stat:
    path: /usr/sbin/ufw
  register: firewall_ufw_binary

- name: Install UFW
  apt:
    name: ufw
    state: present
  when:
    - firewall_manage_ufw | bool
    - firewall_ufw_binary.stat.exists | default(false)

- name: Set default policies
  ufw:
    policy: "{{ item.policy }}"
    direction: "{{ item.direction }}"
  loop:
    - { policy: 'deny', direction: 'incoming' }
    - { policy: 'allow', direction: 'outgoing' }
  when:
    - firewall_manage_ufw | bool
    - firewall_ufw_binary.stat.exists | default(false)

- name: Allow essential ports (SSH first!)
  ufw:
    port: "{{ item.port }}"
    protocol: "{{ item.protocol }}"
    rule: allow
    comment: "{{ item.comment }}"
  loop: "{{ essential_ports }}"
  when:
    - firewall_manage_ufw | bool
    - firewall_ufw_binary.stat.exists | default(false)

- name: Allow necessary mail ports
  ufw:
    port: "{{ item.port }}"
    protocol: "{{ item.protocol }}"
    rule: allow
    comment: "{{ item.comment }}"
  loop: "{{ mail_ports }}"
  when:
    - firewall_manage_ufw | bool
    - firewall_ufw_binary.stat.exists | default(false)

- name: Allow LMTP from private networks
  ufw:
    port: 24
    protocol: tcp
    rule: allow
    from_ip: "{{ item }}"
    comment: 'LMTP private'
  loop: "{{ lmtp_private_networks }}"
  when:
    - firewall_manage_ufw | bool
    - firewall_ufw_binary.stat.exists | default(false)

- name: Deny plaintext ports
  ufw:
    port: "{{ item.port }}"
    protocol: "{{ item.protocol }}"
    rule: deny
    comment: "{{ item.comment }}"
  loop: "{{ denied_ports }}"
  when:
    - firewall_manage_ufw | bool
    - firewall_ufw_binary.stat.exists | default(false)

- name: Enable UFW
  ufw:
    state: enabled
  when:
    - firewall_manage_ufw | bool
    - firewall_ufw_binary.stat.exists | default(false)

- name: Get UFW numbered status
  command: ufw status numbered
  register: ufw_numbered
  changed_when: false
  when:
    - firewall_manage_ufw | bool
    - firewall_ufw_binary.stat.exists | default(false)

- name: Get UFW status verbose
  command: ufw status verbose
  register: ufw_status
  changed_when: false
  when:
    - firewall_manage_ufw | bool
    - firewall_ufw_binary.stat.exists | default(false)

- name: Display UFW status
  debug:
    msg: |
      🔥 UFW Firewall Status
      ====================
      {{ ufw_status.stdout }}
  when:
    - firewall_manage_ufw | bool
    - firewall_ufw_binary.stat.exists | default(false)

- name: Display configured mail rules
  debug:
    msg: |
      🔥 Mail Server Firewall Rules:
      =============================

      ESSENTIAL PORTS (Open - Applied First!):
      {% for port in essential_ports %}
        ✅ {{ port.port }}/{{ port.protocol }} - {{ port.comment }}
      {% endfor %}

      MAIL PORTS (Open):
      {% for port in mail_ports %}
        ✅ {{ port.port }}/{{ port.protocol }} - {{ port.comment }}
      {% endfor %}

      DENIED PORTS (Blocked):
      {% for port in denied_ports %}
        ❌ {{ port.port }}/{{ port.protocol }} - {{ port.comment }}
      {% endfor %}

      LMTP ACCESS (Private Networks):
      {% for network in lmtp_private_networks %}
        ✅ From {{ network }} to port 24/tcp - Local mail delivery
      {% endfor %}

      ⚠️  SECURITY NOTES:
      - SSH port {{ ssh_port }} is open - ensure you use key-based authentication
      - Default policy: deny all incoming, allow all outgoing
      - Only open ports that are absolutely necessary
  when:
    - firewall_manage_ufw | bool
    - firewall_ufw_binary.stat.exists | default(false)

- name: Explain why UFW tasks were skipped
  ansible.builtin.debug:
    msg: >-
      Skipping UFW management on {{ inventory_hostname }} because
      firewall_manage_ufw={{ firewall_manage_ufw | bool }}
      and ufw_present={{ firewall_ufw_binary.stat.exists | default(false) }}.
  when:
    - not (firewall_manage_ufw | bool and (firewall_ufw_binary.stat.exists | default(false)))
