- name: Install cert-manager directly with Helm
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ k3s_platform_kubeconfig_path }}"
    chart_dir="$(mktemp -d /tmp/cert-manager.XXXXXX)"
    cleanup() {
      rm -rf "$chart_dir"
    }
    trap cleanup EXIT

    attempt=1
    max_attempts=6
    while true; do
      rm -rf "$chart_dir"/*
      if helm pull oci://quay.io/jetstack/charts/cert-manager \
        --version "{{ k3s_platform_cert_manager_chart_version }}" \
        --untar \
        --untardir "$chart_dir"; then
        break
      fi
      if [ "$attempt" -ge "$max_attempts" ]; then
        echo "failed to download cert-manager after $attempt attempts" >&2
        exit 1
      fi
      sleep "$((attempt * 30))"
      attempt=$((attempt + 1))
    done

    helm upgrade --install "{{ k3s_platform_values.components.certManager.releaseName }}" "$chart_dir/cert-manager" \
      --namespace cert-manager \
      --create-namespace \
      --set crds.enabled=true \
      --timeout 10m

    kubectl -n cert-manager wait \
      --for=condition=Available \
      deployment/cert-manager \
      deployment/cert-manager-webhook \
      deployment/cert-manager-cainjector \
      --timeout=90s
  args:
    executable: /bin/bash
  when:
    - k3s_platform_values.components.certManager.enabled | default(true)

- name: Install external-secrets directly with Helm
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ k3s_platform_kubeconfig_path }}"
    chart_dir="$(mktemp -d /tmp/external-secrets.XXXXXX)"
    cleanup() {
      rm -rf "$chart_dir"
    }
    trap cleanup EXIT

    attempt=1
    max_attempts=6
    while true; do
      rm -rf "$chart_dir"/*
      if helm pull --repo "https://charts.external-secrets.io" \
        --version "{{ k3s_platform_external_secrets_chart_version }}" \
        --untar \
        --untardir "$chart_dir" \
        external-secrets; then
        break
      fi
      if [ "$attempt" -ge "$max_attempts" ]; then
        echo "failed to download external-secrets after $attempt attempts" >&2
        exit 1
      fi
      sleep "$((attempt * 30))"
      attempt=$((attempt + 1))
    done

    helm upgrade --install external-secrets "$chart_dir/external-secrets" \
      --namespace platform \
      --create-namespace \
      --version "{{ k3s_platform_external_secrets_chart_version }}" \
      --set installCRDs=true \
      --timeout 10m

    kubectl -n platform rollout status deployment/external-secrets \
      --timeout=90s
    kubectl -n platform rollout status deployment/external-secrets-cert-controller \
      --timeout=90s
    kubectl -n platform rollout status deployment/external-secrets-webhook \
      --timeout=90s
  args:
    executable: /bin/bash
  when:
    - k3s_platform_values.components.externalSecrets.enabled | default(true)

- name: Ensure GHCR pull secret for PostgreSQL chart exists
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ k3s_platform_kubeconfig_path }}"
    kubectl -n database create secret docker-registry postgresql-ghcr-pull \
      --docker-server="{{ k3s_platform_ghcr_registry }}" \
      --docker-username="{{ k3s_platform_ghcr_username }}" \
      --docker-password="{{ k3s_platform_ghcr_token }}" \
      --dry-run=client -o yaml | kubectl apply -f -
  args:
    executable: /bin/bash
  when:
    - k3s_platform_ghcr_username | length > 0
    - k3s_platform_ghcr_token | length > 0

- name: Render platform caddy values
  ansible.builtin.template:
    src: platform-caddy-values.yaml.j2
    dest: /tmp/platform-caddy-values.yaml
    mode: "0600"
  when:
    - k3s_platform_values.components.caddy.enabled | default(false)

- name: Render platform apisix values
  ansible.builtin.template:
    src: platform-apisix-values.yaml.j2
    dest: /tmp/platform-apisix-values.yaml
    mode: "0600"
  when:
    - k3s_platform_values.components.apisix.enabled | default(false)

- name: Render platform external-dns values
  ansible.builtin.template:
    src: platform-external-dns-values.yaml.j2
    dest: /tmp/platform-external-dns-values.yaml
    mode: "0600"
  when:
    - k3s_platform_values.components.externalDns.enabled | default(false)

- name: Ensure Cloudflare API token secret exists for external-dns
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ k3s_platform_kubeconfig_path }}"
    kubectl -n platform create secret generic cloudflare-api-token \
      --from-literal=api-token="{{ k3s_platform_cloudflare_api_token }}" \
      --dry-run=client -o yaml | kubectl apply -f -
  args:
    executable: /bin/bash
  when:
    - k3s_platform_values.components.externalDns.enabled | default(false)
    - k3s_platform_cloudflare_api_token | length > 0

- name: Fail when external-dns is enabled but Cloudflare token is missing
  ansible.builtin.fail:
    msg: "CLOUDFLARE_API_TOKEN is required when external-dns is enabled"
  when:
    - k3s_platform_values.components.externalDns.enabled | default(false)
    - k3s_platform_cloudflare_api_token | length == 0

- name: Install reloader directly with Helm
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ k3s_platform_kubeconfig_path }}"
    helm repo add stakater https://stakater.github.io/stakater-charts >/dev/null 2>&1 || true
    helm repo update stakater >/dev/null
    helm upgrade --install reloader stakater/reloader \
      --namespace platform \
      --create-namespace \
      --version "{{ k3s_platform_reloader_chart_version }}" \
      --timeout 10m

    kubectl -n platform rollout status deployment/reloader-reloader \
      --timeout=90s
  args:
    executable: /bin/bash
  when:
    - k3s_platform_values.components.reloader.enabled | default(true)

- name: Install caddy directly with Helm
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ k3s_platform_kubeconfig_path }}"
    helm repo add caddyserver https://caddyserver.github.io/ingress/ >/dev/null 2>&1 || true
    helm repo update caddyserver >/dev/null
    helm upgrade --install "{{ k3s_platform_values.components.caddy.releaseName }}" caddyserver/caddy-ingress-controller \
      --namespace platform \
      --create-namespace \
      --version "{{ k3s_platform_caddy_chart_version }}" \
      -f /tmp/platform-caddy-values.yaml \
      --timeout 10m

    kubectl -n platform rollout status deployment/caddy-caddy-ingress-controller \
      --timeout=90s
  args:
    executable: /bin/bash
  when:
    - k3s_platform_values.components.caddy.enabled | default(false)

- name: Install apisix directly with Helm
  ansible.builtin.shell: |
    set -euo pipefail
    export KUBECONFIG="{{ k3s_platform_kubeconfig_path }}"
    helm repo add apisix https://apache.github.io/apisix-helm-chart >/dev/null 2>&1 || true
    helm repo update apisix >/dev/null
    helm upgrade --install "{{ k3s_platform_values.components.apisix.releaseName }}" apisix/apisix \
      --namespace platform \
      --create-namespace \
      --version "{{ k3s_platform_apisix_chart_version }}" \
      -f /tmp/platform-apisix-values.yaml \
      --timeout 10m

    kubectl -n platform rollout status deployment/apisix \
      --timeout=90s
  args:
    executable: /bin/bash
  when:
    - k3s_platform_values.components.apisix.enabled | default(false)

- name: Addon | external-dns
  ansible.builtin.import_tasks: addons/external-dns.yml
  when:
    - k3s_platform_values.components.externalDns.enabled | default(false)
  tags: [addon, external-dns]
