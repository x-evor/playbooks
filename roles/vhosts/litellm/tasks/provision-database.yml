---
# Provision a dedicated `litellm` database and user on the PostgreSQL server.
# This task uses raw psql commands via sudo to bypass Ansible's tmpfile permission bugs 
# and avoid relying on external dependencies or specific passwords.

- name: Create schema SQL file on remote litellm host
  ansible.builtin.template:
    src: schema.sql.j2
    dest: "{{ litellm_config_dir }}/schema.sql"
    owner: "{{ litellm_service_user }}"
    group: "{{ litellm_service_group }}"
    mode: "0600"
  when: litellm_database_host | trim | length > 0

- name: Create PostgreSQL user if not exists
  ansible.builtin.shell: |
    sudo -u postgres psql -tAc "SELECT 1 FROM pg_roles WHERE rolname='{{ litellm_database_user }}'" | grep -q 1 || \
    sudo -u postgres psql -c "CREATE USER {{ litellm_database_user }} WITH PASSWORD '{{ litellm_database_password }}';"
  args:
    executable: /bin/bash
  register: create_user_result
  changed_when: "'CREATE ROLE' in create_user_result.stdout | default('')"

- name: Create PostgreSQL database if not exists
  ansible.builtin.shell: |
    sudo -u postgres psql -tAc "SELECT 1 FROM pg_database WHERE datname='{{ litellm_database_name }}'" | grep -q 1 || \
    sudo -u postgres psql -c "CREATE DATABASE {{ litellm_database_name }} OWNER {{ litellm_database_user }};"
  args:
    executable: /bin/bash
  register: create_db_result
  changed_when: "'CREATE DATABASE' in create_db_result.stdout | default('')"

- name: Grant privileges on database to user
  ansible.builtin.shell: |
    sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE {{ litellm_database_name }} TO {{ litellm_database_user }};"
  args:
    executable: /bin/bash
  changed_when: false

- name: Apply schema.sql to litellm database
  ansible.builtin.shell: |
    sudo -u postgres psql -d {{ litellm_database_name }} -f {{ litellm_config_dir }}/schema.sql
  args:
    executable: /bin/bash
  register: apply_schema_result
  changed_when: "'CREATE' in apply_schema_result.stdout | default('')"

- name: Grant schema privileges to user
  ansible.builtin.shell: |
    sudo -u postgres psql -d {{ litellm_database_name }} -c "GRANT ALL ON SCHEMA public TO {{ litellm_database_user }}; ALTER SCHEMA public OWNER TO {{ litellm_database_user }};"
  args:
    executable: /bin/bash
  changed_when: false