---
- name: Check Hermes ACP adapter listener
  ansible.builtin.command: ss -ltnp
  register: acp_hermes_ss
  changed_when: false

- name: Validate local Hermes ACP adapter CORS preflight
  ansible.builtin.uri:
    url: "http://{{ acp_hermes_listen_host }}:{{ acp_hermes_listen_port }}/acp/rpc"
    method: OPTIONS
    headers:
      Origin: "{{ acp_hermes_allowed_origins[0] }}"
      Access-Control-Request-Method: POST
    return_content: true
    status_code: [204, 405]
  register: acp_hermes_bridge_http

- name: Validate local Hermes ACP capabilities contract
  ansible.builtin.uri:
    url: "http://{{ acp_hermes_listen_host }}:{{ acp_hermes_listen_port }}/acp/rpc"
    method: POST
    headers:
      Authorization: "Bearer {{ acp_hermes_effective_auth_token | default(acp_hermes_auth_token) }}"
      Content-Type: application/json
    body_format: json
    body:
      jsonrpc: "2.0"
      id: "validate-hermes-capabilities"
      method: acp.capabilities
      params: {}
    return_content: true
    status_code: 200
  register: acp_hermes_capabilities
  changed_when: false
  no_log: true

- name: Assert local Hermes ACP capabilities expose Hermes provider
  ansible.builtin.assert:
    that:
      - acp_hermes_capabilities.status == 200
      - acp_hermes_capabilities.json.result.provider.id | default('') == "hermes"
      - "'hermes' in (acp_hermes_capabilities.json.result.providers | default([]))"

- name: Show Hermes ACP adapter status
  ansible.builtin.command: systemctl status "{{ acp_hermes_service_name }}" --no-pager
  register: acp_hermes_status
  changed_when: false
  failed_when: false

- name: Show Hermes ACP validation summary
  ansible.builtin.debug:
    msg:
      - "Hermes public base URL: {{ acp_hermes_public_base_url }}"
      - "Preferred WebSocket endpoint: {{ acp_hermes_public_base_url }}/acp"
      - "Compatibility HTTP RPC endpoint: {{ acp_hermes_public_base_url }}/acp/rpc"
      - "Hermes adapter listener: {{ acp_hermes_listen_host }}:{{ acp_hermes_listen_port }}"
      - "Service: {{ acp_hermes_status.stdout | default('N/A') }}"
      - "Socket: {{ acp_hermes_ss.stdout | default('N/A') }}"
      - "Adapter preflight status: {{ acp_hermes_bridge_http.status | default('N/A') }}"
      - "Adapter capabilities status: {{ acp_hermes_capabilities.status | default('N/A') }}"
      - "Adapter preflight allow-origin: {{ acp_hermes_bridge_http.access_control_allow_origin | default('N/A') }}"
