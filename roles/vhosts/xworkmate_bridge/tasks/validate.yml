---
- name: Validate Caddy config for unified ACP ingress
  ansible.builtin.command: caddy validate --config "{{ xworkmate_bridge_caddyfile_path }}"
  changed_when: false

- name: Read deployed xworkmate-bridge Caddy fragment
  ansible.builtin.command:
    cmd: cat "{{ xworkmate_bridge_service_caddy_fragment_path }}"
  changed_when: false
  register: xworkmate_bridge_fragment

- name: Check Codex route through unified ACP ingress
  ansible.builtin.uri:
    url: "https://{{ xworkmate_bridge_domain }}/acp-server/codex"
    method: GET
    headers:
      Authorization: "Bearer {{ xworkmate_bridge_auth_token }}"
    follow_redirects: none
    status_code: [200, 301, 302, 307, 308, 401, 403, 404, 502]
  changed_when: false
  register: xworkmate_bridge_codex_redirect
  when:
    - deploy_acp_codex | bool

- name: Check OpenCode route through unified ACP ingress
  ansible.builtin.uri:
    url: "https://{{ xworkmate_bridge_domain }}/acp-server/opencode"
    method: GET
    headers:
      Authorization: "Bearer {{ xworkmate_bridge_auth_token }}"
    follow_redirects: none
    status_code: [200, 301, 302, 307, 308, 401, 403, 404, 502]
  changed_when: false
  register: xworkmate_bridge_opencode_redirect
  when:
    - deploy_acp_opencode | bool

- name: Check Gemini route through unified ACP ingress
  ansible.builtin.uri:
    url: "https://{{ xworkmate_bridge_domain }}/acp-server/gemini"
    method: GET
    headers:
      Authorization: "Bearer {{ xworkmate_bridge_auth_token }}"
    follow_redirects: none
    status_code: [200, 301, 302, 307, 308, 401, 403, 404, 502]
  changed_when: false
  register: xworkmate_bridge_gemini_redirect
  when:
    - deploy_acp_gemini | bool

- name: Check Hermes route through unified ACP ingress
  ansible.builtin.uri:
    url: "https://{{ xworkmate_bridge_domain }}/acp-server/hermes"
    method: GET
    headers:
      Authorization: "Bearer {{ xworkmate_bridge_auth_token }}"
    follow_redirects: none
    status_code: [200, 301, 302, 307, 308, 401, 403, 404, 502]
  changed_when: false
  register: xworkmate_bridge_hermes_redirect

- name: Check xworkmate-bridge public domain root
  ansible.builtin.uri:
    url: "https://{{ xworkmate_bridge_service_domain }}/"
    method: GET
    headers:
      Authorization: "Bearer {{ xworkmate_bridge_auth_token }}"
    follow_redirects: none
    status_code: [200, 301, 302, 307, 308]
  changed_when: false
  register: xworkmate_bridge_service_root

- name: Check xworkmate-bridge public domain ping
  ansible.builtin.command:
    argv:
      - curl
      - --fail-with-body
      - --silent
      - --show-error
      - --location
      - --max-time
      - "10"
      - --header
      - "Authorization: Bearer {{ xworkmate_bridge_auth_token }}"
      - "https://{{ xworkmate_bridge_service_domain }}/api/ping"
  changed_when: false
  failed_when: false
  no_log: true
  register: xworkmate_bridge_service_ping
  until:
    - xworkmate_bridge_service_ping.rc == 0
    - xworkmate_bridge_service_ping.stdout | length > 0
    - xworkmate_bridge_service_ping.stdout is regex('"status"\\s*:\\s*"ok"')
  retries: 3
  delay: 5

- name: Assert xworkmate-bridge ping reports deployed image ref
  ansible.builtin.assert:
    that:
      - "(xworkmate_bridge_service_ping.stdout | from_json).image == service_compose_image"
    fail_msg: >-
      xworkmate-bridge /api/ping does not report the deployed image ref.
      Expected: {{ service_compose_image }}
      Got: {{ (xworkmate_bridge_service_ping.stdout | from_json).image | default('N/A') }}

- name: Check deprecated ACP fragments are absent
  ansible.builtin.stat:
    path: "{{ item }}"
  changed_when: false
  loop: "{{ xworkmate_bridge_obsolete_caddy_fragment_paths }}"
  register: xworkmate_bridge_obsolete_fragments
  when:
    - not ansible_check_mode

- name: Assert deprecated ACP fragments were removed
  ansible.builtin.assert:
    that:
      - not item.stat.exists
    fail_msg: "Deprecated ACP fragment still exists: {{ item.item }}"
  loop: "{{ xworkmate_bridge_obsolete_fragments.results }}"
  loop_control:
    label: "{{ item.item }}"
  when:
    - not ansible_check_mode

- name: Show xworkmate-bridge compose status
  ansible.builtin.command: >-
    docker compose
    --project-name {{ xworkmate_bridge_project_name }}
    -f {{ xworkmate_bridge_compose_file }}
    ps
  register: xworkmate_bridge_status
  changed_when: false
  failed_when: false

- name: Summarize unified ACP ingress state
  ansible.builtin.debug:
    msg:
      - "Bridge service public base URL: {{ xworkmate_bridge_service_public_base_url }}"
      - "OpenClaw public gateway URL: {{ xworkmate_bridge_service_public_base_url }}/acp-server/gateway/openclaw"
      - "Codex public base URL: {{ xworkmate_bridge_service_public_base_url }}/acp-server/codex"
      - "OpenCode public base URL: {{ xworkmate_bridge_service_public_base_url }}/acp-server/opencode"
      - "Gemini public base URL: {{ xworkmate_bridge_service_public_base_url }}/acp-server/gemini"
      - "Hermes public base URL: {{ xworkmate_bridge_service_public_base_url }}/acp-server/hermes"
      - "Bridge image ref: {{ service_compose_image }}"
      - "Bridge service status: {{ xworkmate_bridge_status.stdout | default('N/A') }}"
      - "Codex route: /acp-server/codex -> {{ xworkmate_bridge_codex_upstream_host }}:{{ xworkmate_bridge_codex_upstream_port }}"
      - "OpenCode route: /acp-server/opencode -> {{ xworkmate_bridge_opencode_upstream_host }}:{{ xworkmate_bridge_opencode_upstream_port }}"
      - "Gemini route: /acp-server/gemini -> {{ xworkmate_bridge_gemini_upstream_host }}:{{ xworkmate_bridge_gemini_upstream_port }}"
      - "Hermes route: /acp-server/hermes -> {{ xworkmate_bridge_hermes_upstream_host }}:{{ xworkmate_bridge_hermes_upstream_port }}"
      - "OpenClaw route: /acp-server/gateway/openclaw -> {{ xworkmate_bridge_openclaw_upstream_host }}:{{ xworkmate_bridge_openclaw_upstream_port }}"
