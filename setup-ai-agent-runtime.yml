---
- name: Setup AI agent runtime bootstrap
  hosts: "{{ ai_agent_runtime_hosts | default('jp-xhttp-contabo.svc.plus') }}"
  become: true
  gather_facts: true
  vars:
    xfce_manage_user: true
    xfce_user_password_plaintext: "L@xiaomin1250"
    xfce_user_shell: /bin/bash
    xfce_enable_ufw: false
  roles:
    - role: roles/vhosts/xfce_xrdp_minimal/
      tags: [xfce, xfce_xrdp_minimal]
    - role: roles/ai_agent_runtime/
      when: ai_agent_runtime_enabled | default(true) | bool
      tags: [ai_agent_runtime, agent_skills]
    - role: roles/vhosts/gateway_openclaw/
      when: gateway_openclaw_enabled | default(true) | bool
      tags: [gateway_openclaw, openclaw]
    - role: roles/vhosts/acp_server_codex/
      when: acp_server_codex_enabled | default(true) | bool
      tags: [acp_codex, codex]
    - role: roles/vhosts/acp_server_opencode/
      when: acp_server_opencode_enabled | default(true) | bool
      tags: [acp_opencode, opencode]
    - role: roles/vhosts/acp_server_gemini/
      when: acp_server_gemini_enabled | default(true) | bool
      tags: [acp_gemini, gemini]
    - role: roles/vhosts/acp_server_hermes/
      when: acp_server_hermes_enabled | default(true) | bool
      tags: [acp_hermes, hermes, hermers]
