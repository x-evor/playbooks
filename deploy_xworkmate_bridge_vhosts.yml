---
- import_playbook: setup-ai-agent-runtime.yml
  vars:
    ai_agent_runtime_hosts: "{{ xworkmate_bridge_hosts | default('all') }}"
    ai_agent_runtime_enabled: "{{ xworkmate_bridge_ai_agent_runtime_enabled | default(true) }}"
    ai_agent_runtime_skills_enabled: "{{ xworkmate_bridge_agent_skills_enabled | default(false) }}"
    gateway_openclaw_enabled: "{{ xworkmate_bridge_gateway_openclaw_enabled | default(true) }}"
    acp_server_codex_enabled: "{{ xworkmate_bridge_acp_server_codex_enabled | default(true) }}"
    acp_server_opencode_enabled: "{{ xworkmate_bridge_acp_server_opencode_enabled | default(true) }}"
    acp_server_gemini_enabled: "{{ xworkmate_bridge_acp_server_gemini_enabled | default(true) }}"
    acp_server_hermes_enabled: "{{ xworkmate_bridge_acp_server_hermes_enabled | default(true) }}"

- name: Deploy ACP vhosts through xworkmate bridge
  hosts: "{{ xworkmate_bridge_hosts | default('all') }}"
  become: true
  gather_facts: true
  roles:
    - role: roles/vhosts/acp_server_codex/
      tags: [acp_codex]
    - role: roles/vhosts/acp_server_opencode/
      tags: [acp_opencode]
    - role: roles/vhosts/acp_server_gemini/
      tags: [acp_gemini]
    - role: roles/vhosts/acp_server_hermes/
      tags: [acp_hermes]
    - role: roles/vhosts/xworkmate_bridge/
      tags: [xworkmate_bridge]
