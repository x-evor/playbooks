---
- import_playbook: setup-xworkspace-console.yaml
  vars:
    ai_agent_runtime_hosts: "{{ xworkmate_bridge_hosts | default('all') }}"
    xworkspace_console_user: "{{ xworkmate_bridge_user | default('ubuntu') }}"
    xworkspace_console_enable_ttyd: "{{ xworkmate_bridge_enable_ttyd | default(true) }}"
    xworkspace_console_portal_url: "{{ xworkmate_bridge_portal_url | default('http://localhost:7000') }}"

- name: Deploy ACP vhosts through xworkmate bridge
  hosts: "{{ xworkmate_bridge_hosts | default('all') }}"
  become: true
  gather_facts: true
  roles:
    - role: roles/vhosts/acp_server_codex/
      tags: [acp_codex]
    - role: roles/vhosts/acp_server_opencode/
      tags: [acp_opencode]
    - role: roles/vhosts/acp_server_gemini/
      tags: [acp_gemini]
    - role: roles/vhosts/acp_server_hermes/
      tags: [acp_hermes]
    - role: roles/vhosts/xworkmate_bridge/
      tags: [xworkmate_bridge]
